name: Update latest note

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-latest-note
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest note article
        shell: pwsh
        run: ./scripts/update-latest-note.ps1

      - name: Commit changed JSON
        shell: bash
        run: |
          if git diff --quiet -- assets/latest-note.json; then
            echo "No update."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/latest-note.json
          git commit -m "chore: update latest note"
          git push
